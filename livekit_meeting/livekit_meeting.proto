syntax = "proto3";
package openim.livekit_meeting;

import "sdkws/sdkws.proto";
import "wrapperspb/wrapperspb.proto";
import "schedule/schedule.proto";

option go_package = "github.com/openimsdk/protocol/livekit_meeting";

// ==================== 基础数据结构 ====================

// MeetingSetting 会议设置
message MeetingSetting {
  bool enableCameraOnJoin = 1;
  bool enableMicrophoneOnJoin = 2;
  bool allowScreenShare = 3;
  bool enableRecording = 4;
  bool enableWaitingRoom = 5;
  string password = 6;
  int32 maxParticipants = 7;
  repeated int32 reminderMinutes = 8;   // 提前提醒分钟数列表，如 [5, 15, 30]
  bool canParticipantInvite = 9;        // 参会者是否可以邀请他人
  bool canParticipantUnmute = 10;       // 参会者是否可以自行解除静音
}

// RepeatRule 重复规则
message RepeatRule {
  string type = 1;
  int32 interval = 2;
  int64 endDate = 3;
  repeated int32 daysOfWeek = 4;
}

// MeetingScheduleInfo 会议关联的日程完整信息（仅日程会议有值）
message MeetingScheduleInfo {
  string scheduleID = 1;
  string title = 2;
  int64 startTime = 3;
  int64 endTime = 4;
  string location = 5;
  string description = 6;
  string creatorUserID = 7;
  string creatorNickname = 8;
  int32 type = 9;                       // 日程类型：0=日程 1=会议
  int32 visibility = 10;
  string scheduleGroupID = 11;
  string status = 12;
  string roomID = 13;                   // 会议室ID
  string timeZone = 14;                 // 时区
  bool allDay = 15;                     // 是否全天
  repeated string attachmentURLs = 16;  // 附件URL列表
  bool allowMemberJoin = 17;            // 允许成员主动加入
  bool notifyByEmail = 18;              // 同时通过邮件通知参与人
  string meetingMinutesID = 19;         // 会议纪要文档ID
  bool isTemporary = 20;                // 是否临时会议
  openim.schedule.MeetingSettings meetingSettings = 21;     // 会议设置（仅type=1会议时有效）
  openim.schedule.ScheduleRepeatInfo repeatInfo = 22;       // 重复规则
  int64 createTime = 23;                // 创建时间（时间戳）
  int64 updateTime = 24;                // 更新时间（时间戳）
}

// MeetingInfo 会议信息
message MeetingInfo {
  string meetingID = 1;
  string meetingNumber = 2;
  string title = 3;
  string creatorUserID = 4;
  string creatorNickname = 5;
  string creatorFaceURL = 6;
  int32 meetingType = 7;                // 1=快速会议 2=预约会议
  string status = 8;                    // scheduled/in-progress/ended/cancelled
  int64 scheduledTime = 9;
  int64 scheduledEndTime = 10;
  int64 actualStartTime = 11;
  int64 actualEndTime = 12;
  int32 duration = 13;
  string password = 14;
  bool showInCalendar = 15;
  RepeatRule repeatRule = 16;
  string livekitRoomID = 17;
  MeetingSetting setting = 18;
  int64 createTime = 19;
  int64 updateTime = 20;
  string ex = 21;
  int32 participantCount = 22;
  int32 visibility = 23;               // 可见性：1=仅参与者可见(默认) 2=公开(团队可见) 3=私密(仅组织者)
  repeated string participantNicknames = 24;  // 参会者昵称预览列表（前5个）
  repeated string participantFaceURLs = 25;   // 参会者头像预览列表（前5个）
  string scheduleID = 26;              // 关联的日程ID（从日程创建会议时记录）
  MeetingScheduleInfo scheduleInfo = 27; // 关联的日程详情（当scheduleID非空时填充）
}

// MeetingParticipant 参会者信息
message MeetingParticipant {
  string meetingID = 1;
  string userID = 2;
  string nickname = 3;
  string faceURL = 4;
  int32 role = 5;                       // 1=主持人 2=联合主持人 3=参会者
  int32 status = 6;                     // 参会状态：1=已加入 2=已离开 3=被踢出
  int64 joinTime = 7;
  int64 leaveTime = 8;
  int32 inviteStatus = 9;              // 邀请响应：0=待回复 1=已接受 2=已拒绝 3=待定
  string inviterUserID = 10;           // 邀请人ID
  int64 inviteTime = 11;              // 邀请时间
  int64 respondTime = 12;             // 响应时间
}

// LiveKitInfo LiveKit连接信息
message LiveKitInfo {
  string token = 1;
  string url = 2;
  string roomID = 3;
  string roomName = 4;
}

// MeetingInviteRecord 邀请历史记录
message MeetingInviteRecord {
  string meetingID = 1;
  string inviterUserID = 2;
  string inviterNickname = 3;
  string inviteeUserID = 4;
  string inviteeNickname = 5;
  int64 inviteTime = 6;
  int32 inviteStatus = 7;              // 0=待回复 1=已接受 2=已拒绝 3=待定 4=已取消
  int64 respondTime = 8;
  string cancelReason = 9;
}

// NotificationPreference 通知偏好
message NotificationPreference {
  string userID = 1;
  bool enableMeetingInvite = 2;        // 会议邀请通知
  bool enableMeetingChange = 3;        // 会议变更通知
  bool enableMeetingCancel = 4;        // 会议取消通知
  bool enableMeetingReminder = 5;      // 会议提醒通知
  bool enableParticipantChange = 6;    // 参会者变更通知
}

// ==================== 创建快速会议 ====================

message CreateQuickMeetingReq {
  string title = 1;
  MeetingSetting setting = 2;
  bool showInCalendar = 3;
  int32 visibility = 4;               // 可见性
}

message CreateQuickMeetingResp {
  MeetingInfo meeting = 1;
  LiveKitInfo liveKit = 2;
}

// ==================== 预约会议 ====================

message ScheduleMeetingReq {
  string title = 1;
  int64 scheduledTime = 2;
  int32 duration = 3;
  repeated string participantUserIDs = 4;
  MeetingSetting setting = 5;
  bool showInCalendar = 6;
  RepeatRule repeatRule = 7;
  int32 visibility = 8;               // 可见性
}

message ScheduleMeetingResp {
  MeetingInfo meeting = 1;
}

// ==================== 加入会议 ====================

message JoinMeetingReq {
  string meetingNumber = 1;
  string password = 2;
}

message JoinMeetingResp {
  MeetingInfo meeting = 1;
  LiveKitInfo liveKit = 2;
}

// ==================== 获取会议列表 ====================

message GetMeetingListReq {
  repeated string status = 1;
  int64 startTime = 2;
  int64 endTime = 3;
  int32 meetingType = 4;
  openim.protobuf.BoolValue showInCalendar = 5;
  sdkws.RequestPagination pagination = 6;
  string keyword = 7;                  // 搜索关键词，模糊匹配会议名称、发起人昵称、参会人昵称（OR关系）
}

message GetMeetingListResp {
  int32 total = 1;
  repeated MeetingInfo meetings = 2;
}

// ==================== 获取会议详情 ====================

message GetMeetingReq {
  string meetingID = 1;
}

message GetMeetingResp {
  MeetingInfo meeting = 1;
  repeated MeetingParticipant participants = 2;
}

// ==================== 更新会议 ====================

message UpdateMeetingReq {
  string meetingID = 1;
  openim.protobuf.StringValue title = 2;
  openim.protobuf.Int64Value scheduledTime = 3;
  openim.protobuf.Int32Value duration = 4;
  MeetingSetting setting = 5;
  openim.protobuf.BoolValue showInCalendar = 6;
  RepeatRule repeatRule = 7;
  openim.protobuf.Int32Value visibility = 8;  // 可见性
}

message UpdateMeetingResp {
  MeetingInfo meeting = 1;
}

// ==================== 取消会议 ====================

message CancelMeetingReq {
  string meetingID = 1;
  string reason = 2;
}

message CancelMeetingResp {
}

// ==================== 结束会议 ====================

message EndMeetingReq {
  string meetingID = 1;
}

message EndMeetingResp {
}

// ==================== 邀请参会 ====================

message InviteToMeetingReq {
  string meetingID = 1;
  repeated string userIDs = 2;
}

message InviteToMeetingResp {
  repeated string successUserIDs = 1;
  repeated string failedUserIDs = 2;
}

// ==================== 响应会议邀请 ====================

message RespondMeetingInvitationReq {
  string meetingID = 1;
  int32 response = 2;                  // 1=接受 2=拒绝 3=待定
  string reason = 3;                   // 拒绝原因（可选）
}

message RespondMeetingInvitationResp {
}

// ==================== 取消邀请 ====================

message CancelMeetingInvitationReq {
  string meetingID = 1;
  repeated string userIDs = 2;
  string reason = 3;
}

message CancelMeetingInvitationResp {
  repeated string successUserIDs = 1;
  repeated string failedUserIDs = 2;
}

// ==================== 获取邀请记录 ====================

message GetInviteRecordListReq {
  string meetingID = 1;
  sdkws.RequestPagination pagination = 2;
}

message GetInviteRecordListResp {
  int32 total = 1;
  repeated MeetingInviteRecord records = 2;
}

// ==================== 踢出参会者 ====================

message KickParticipantReq {
  string meetingID = 1;
  repeated string userIDs = 2;
  string reason = 3;
}

message KickParticipantResp {
  repeated string successUserIDs = 1;
  repeated string failedUserIDs = 2;
}

// ==================== 设置参会者角色 ====================

message SetParticipantRoleReq {
  string meetingID = 1;
  string userID = 2;
  int32 role = 3;                      // 1=主持人 2=联合主持人 3=参会者
}

message SetParticipantRoleResp {
}

// ==================== 获取/刷新会议Token ====================

message GetMeetingTokenReq {
  string meetingID = 1;
}

message GetMeetingTokenResp {
  LiveKitInfo liveKit = 1;
}

// ==================== 同步会议数据 ====================

message SyncMeetingReq {
  int64 lastSyncTime = 1;
}

message SyncMeetingResp {
  repeated MeetingInfo meetings = 1;
  repeated string deletedMeetingIDs = 2;
  int64 syncTime = 3;
}

// ==================== 会议提醒 ====================

message SetMeetingReminderReq {
  string meetingID = 1;
  repeated int32 reminderMinutes = 2;  // 提前提醒分钟数列表
}

message SetMeetingReminderResp {
}

message GetMeetingRemindersReq {
  string meetingID = 1;
}

message GetMeetingRemindersResp {
  repeated int32 reminderMinutes = 1;
}

// ==================== 通知偏好 ====================

message SetNotificationPreferenceReq {
  NotificationPreference preference = 1;
}

message SetNotificationPreferenceResp {
}

message GetNotificationPreferenceReq {
}

message GetNotificationPreferenceResp {
  NotificationPreference preference = 1;
}

// ==================== 会议通知数据结构 ====================

// MeetingCreatedTips 会议创建通知
message MeetingCreatedTips {
  MeetingInfo meeting = 1;
  sdkws.UserInfo opUser = 2;
}

// MeetingUpdatedTips 会议更新通知
message MeetingUpdatedTips {
  MeetingInfo meeting = 1;
  sdkws.UserInfo opUser = 2;
}

// MeetingDeletedTips 会议删除/取消通知
message MeetingDeletedTips {
  string meetingID = 1;
  string reason = 2;
  sdkws.UserInfo opUser = 3;
}

// MeetingInvitationTips 会议邀请通知
message MeetingInvitationTips {
  MeetingInfo meeting = 1;
  sdkws.UserInfo inviter = 2;
}

// InvitationRespondedTips 邀请响应通知
message InvitationRespondedTips {
  string meetingID = 1;
  string userID = 2;
  string nickname = 3;
  int32 response = 4;                  // 1=接受 2=拒绝 3=待定
  string reason = 5;
  sdkws.UserInfo opUser = 6;
}

// InvitationCancelledTips 邀请取消通知
message InvitationCancelledTips {
  string meetingID = 1;
  repeated string cancelledUserIDs = 2;
  string reason = 3;
  sdkws.UserInfo opUser = 4;
}

// MeetingParticipantChangedTips 参会者变更通知
message MeetingParticipantChangedTips {
  string meetingID = 1;
  MeetingParticipant participant = 2;
  string action = 3;                    // joined/left/kicked/role_changed
  sdkws.UserInfo opUser = 4;
}

// MeetingStatusChangedTips 会议状态变更通知
message MeetingStatusChangedTips {
  string meetingID = 1;
  string oldStatus = 2;
  string newStatus = 3;
  sdkws.UserInfo opUser = 4;
}

// MeetingReminderTips 会议提醒通知
message MeetingReminderTips {
  MeetingInfo meeting = 1;
  int32 reminderMinutes = 2;
}

// ==================== LiveKit Webhook ====================

message ProcessLiveKitWebhookReq {
  string event = 1;           // 事件类型: participant_left, room_finished
  string roomName = 2;        // LiveKit 房间名（= meetingID）
  string identity = 3;        // 参与者 identity（= userID），participant_left 时必填
}

message ProcessLiveKitWebhookResp {
}

// ==================== RPC 服务定义 ====================

service LiveKitMeeting {
  rpc CreateQuickMeeting(CreateQuickMeetingReq) returns (CreateQuickMeetingResp);
  rpc ScheduleMeeting(ScheduleMeetingReq) returns (ScheduleMeetingResp);
  rpc JoinMeeting(JoinMeetingReq) returns (JoinMeetingResp);
  rpc GetMeetingList(GetMeetingListReq) returns (GetMeetingListResp);
  rpc GetMeeting(GetMeetingReq) returns (GetMeetingResp);
  rpc UpdateMeeting(UpdateMeetingReq) returns (UpdateMeetingResp);
  rpc CancelMeeting(CancelMeetingReq) returns (CancelMeetingResp);
  rpc EndMeeting(EndMeetingReq) returns (EndMeetingResp);
  rpc InviteToMeeting(InviteToMeetingReq) returns (InviteToMeetingResp);
  rpc KickParticipant(KickParticipantReq) returns (KickParticipantResp);
  rpc GetMeetingToken(GetMeetingTokenReq) returns (GetMeetingTokenResp);
  rpc SyncMeeting(SyncMeetingReq) returns (SyncMeetingResp);

  // 新增接口
  rpc RespondMeetingInvitation(RespondMeetingInvitationReq) returns (RespondMeetingInvitationResp);
  rpc CancelMeetingInvitation(CancelMeetingInvitationReq) returns (CancelMeetingInvitationResp);
  rpc GetInviteRecordList(GetInviteRecordListReq) returns (GetInviteRecordListResp);
  rpc SetParticipantRole(SetParticipantRoleReq) returns (SetParticipantRoleResp);
  rpc SetMeetingReminder(SetMeetingReminderReq) returns (SetMeetingReminderResp);
  rpc GetMeetingReminders(GetMeetingRemindersReq) returns (GetMeetingRemindersResp);
  rpc SetNotificationPreference(SetNotificationPreferenceReq) returns (SetNotificationPreferenceResp);
  rpc GetNotificationPreference(GetNotificationPreferenceReq) returns (GetNotificationPreferenceResp);
  rpc ProcessLiveKitWebhook(ProcessLiveKitWebhookReq) returns (ProcessLiveKitWebhookResp);

  // 日程模块调用：通知会议创建（由日程创建会议记录后触发）
  rpc NotifyMeetingCreated(NotifyMeetingCreatedReq) returns (NotifyMeetingCreatedResp);
  // 日程模块调用：通知会议更新（由日程更新会议字段后触发）
  rpc NotifyMeetingUpdated(NotifyMeetingUpdatedReq) returns (NotifyMeetingUpdatedResp);
}

// NotifyMeetingCreatedReq 日程模块通知 meeting 服务发送 MeetingCreated 通知
message NotifyMeetingCreatedReq {
  string scheduleID = 1;   // 关联的日程ID，meeting 服务通过此 ID 查找会议记录
}

message NotifyMeetingCreatedResp {}

// NotifyMeetingUpdatedReq 日程模块通知 meeting 服务发送 MeetingUpdated 通知
message NotifyMeetingUpdatedReq {
  string scheduleID = 1;   // 关联的日程ID
}

message NotifyMeetingUpdatedResp {}
